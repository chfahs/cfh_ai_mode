<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>朝代配對練習</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --ink: #130d0a;
      --paper: #f3dfaa;
      --paper-deep: #e7c978;
      --gold: #d7a945;
      --gold-soft: rgba(215, 169, 69, 0.35);
      --red: #b22924;
      --red-bright: #e4473e;
      --jade: #45a66c;
      --shadow: rgba(0, 0, 0, 0.36);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 18% 14%, rgba(215, 169, 69, 0.18), transparent 26%),
        radial-gradient(circle at 84% 78%, rgba(178, 41, 36, 0.22), transparent 30%),
        linear-gradient(90deg, rgba(215, 169, 69, 0.045) 1px, transparent 1px),
        linear-gradient(rgba(215, 169, 69, 0.04) 1px, transparent 1px),
        #130d0a;
      background-size: auto, auto, 44px 44px, 44px 44px, auto;
      color: #f8ecd1;
      font-family: "Noto Serif TC", "PMingLiU", "MingLiU", serif;
    }

    .map-link {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 20;
      border: 1px solid rgba(215, 169, 69, 0.75);
      border-radius: 8px;
      background: rgba(19, 13, 10, 0.86);
      color: #ffe4a3;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 900;
      text-decoration: none;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.22);
    }

    .app {
      width: min(1180px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 22px;
      border-bottom: 1px solid var(--gold-soft);
      padding-bottom: 18px;
    }

    h1 {
      margin: 0;
      color: #ffe4a3;
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: 0;
      text-shadow: 0 2px 0 #4c1b13, 0 0 18px rgba(215, 169, 69, 0.34);
    }

    .subtitle {
      margin: 8px 0 0;
      color: rgba(248, 236, 209, 0.78);
      font-size: 15px;
      line-height: 1.6;
    }

    .counter {
      min-width: 148px;
      border: 1px solid rgba(215, 169, 69, 0.7);
      border-radius: 8px;
      background: rgba(19, 13, 10, 0.74);
      padding: 12px 16px;
      color: #ffe4a3;
      text-align: center;
      box-shadow: inset 0 0 18px rgba(215, 169, 69, 0.08);
    }

    .counter span {
      display: block;
      color: #fff6da;
      font-size: 28px;
      font-weight: 900;
      line-height: 1.1;
    }

    .game {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(300px, 360px);
      gap: 22px;
      align-items: start;
    }

    .dynasty-board,
    .event-panel {
      border: 1px solid rgba(215, 169, 69, 0.66);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255, 228, 163, 0.08), rgba(178, 41, 36, 0.08)),
        rgba(19, 13, 10, 0.74);
      box-shadow: 0 18px 40px var(--shadow), inset 0 0 28px rgba(215, 169, 69, 0.08);
    }

    .dynasty-board {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      padding: 16px;
    }

    .dynasty-card {
      min-height: 206px;
      border: 2px solid var(--gold);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 246, 218, 0.94), rgba(231, 201, 120, 0.9)),
        var(--paper);
      color: #32170f;
      overflow: hidden;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.26);
    }

    .dynasty-name {
      display: grid;
      place-items: center;
      min-height: 62px;
      border-bottom: 1px solid rgba(91, 46, 20, 0.25);
      background:
        linear-gradient(90deg, transparent, rgba(178, 41, 36, 0.12), transparent),
        rgba(255, 250, 230, 0.36);
      color: #721f17;
      font-size: 34px;
      font-weight: 900;
    }

    .drop-zone {
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px;
      min-height: 138px;
      padding: 12px;
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .drop-zone.drag-over {
      background: rgba(215, 169, 69, 0.28);
      box-shadow: inset 0 0 0 2px rgba(178, 41, 36, 0.3);
    }

    .event-panel {
      position: sticky;
      top: 22px;
      padding: 16px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      color: #ffe4a3;
      font-weight: 900;
    }

    .remaining {
      color: rgba(248, 236, 209, 0.78);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .event-list {
      display: grid;
      gap: 10px;
      min-height: 560px;
      align-content: start;
    }

    .event-card {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 52px;
      border: 1px solid rgba(228, 71, 62, 0.86);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(178, 41, 36, 0.2), rgba(19, 13, 10, 0.92)),
        #24100d;
      color: #fff5db;
      padding: 9px 12px;
      cursor: grab;
      user-select: none;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.26), inset 0 0 14px rgba(178, 41, 36, 0.13);
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
    }

    .event-card:active {
      cursor: grabbing;
    }

    .event-card.dragging {
      opacity: 0.48;
      transform: scale(0.98);
    }

    .event-card.wrong {
      animation: wrongFlash 0.3s ease;
    }

    .event-card.correct {
      width: fit-content;
      max-width: 100%;
      min-height: 34px;
      border-color: rgba(69, 166, 108, 0.9);
      background: linear-gradient(135deg, rgba(69, 166, 108, 0.92), rgba(28, 92, 56, 0.94));
      color: #f5ffe9;
      padding: 6px 9px;
      cursor: default;
      font-size: 13px;
      box-shadow: 0 6px 12px rgba(34, 86, 55, 0.28);
    }

    .event-card.correct .event-icon {
      width: 22px;
      height: 22px;
      font-size: 14px;
    }

    .event-icon {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 246, 218, 0.13);
      font-size: 19px;
      line-height: 1;
    }

    .event-text {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
    }

    .complete-overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 24px;
      background: rgba(19, 13, 10, 0.72);
      backdrop-filter: blur(5px);
      z-index: 10;
    }

    .complete-overlay.show {
      display: grid;
      animation: goldFlash 0.8s ease;
    }

    .complete-dialog {
      width: min(92vw, 420px);
      border: 2px solid #f1c35b;
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(255, 246, 218, 0.98), rgba(231, 201, 120, 0.98));
      color: #32170f;
      padding: 30px;
      text-align: center;
      box-shadow: 0 0 42px rgba(241, 195, 91, 0.72), 0 24px 80px rgba(0, 0, 0, 0.48);
    }

    .complete-dialog h2 {
      margin: 0 0 10px;
      color: #8a2118;
      font-size: 36px;
      font-weight: 900;
    }

    .complete-dialog p {
      margin: 0 0 22px;
      font-size: 18px;
      font-weight: 700;
    }

    button {
      min-height: 46px;
      border: 0;
      border-radius: 8px;
      background: #8a2118;
      color: #fff6da;
      padding: 0 22px;
      font-family: inherit;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(138, 33, 24, 0.32);
    }

    button:active {
      transform: translateY(1px);
    }

    @keyframes wrongFlash {
      0%, 100% {
        transform: translateX(0);
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.26);
      }
      25% {
        transform: translateX(-7px);
        border-color: #ff5a4f;
        box-shadow: 0 0 22px rgba(255, 45, 35, 0.85);
      }
      50% {
        transform: translateX(7px);
        background: rgba(155, 18, 14, 0.95);
      }
      75% {
        transform: translateX(-4px);
      }
    }

    @keyframes goldFlash {
      0% {
        background: rgba(255, 214, 96, 0.08);
      }
      35% {
        background: rgba(255, 214, 96, 0.38);
      }
      100% {
        background: rgba(19, 13, 10, 0.72);
      }
    }

    @media (max-width: 860px) {
      .app {
        padding: 18px;
      }

      .topbar {
        align-items: stretch;
        flex-direction: column;
      }

      .counter {
        width: 100%;
      }

      .game {
        grid-template-columns: 1fr;
      }

      .dynasty-board {
        grid-template-columns: 1fr;
      }

      .event-panel {
        position: static;
      }

      .event-list {
        display: flex;
        overflow-x: auto;
        gap: 12px;
        min-height: 90px;
        padding-bottom: 8px;
        scroll-snap-type: x proximity;
      }

      .event-list .event-card {
        flex: 0 0 220px;
        scroll-snap-align: start;
      }
    }
  </style>
</head>
<body>
  <a class="map-link" href="../index.html">← 回到大地圖</a>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>朝代配對</h1>
        <p class="subtitle">把右側事件拖曳到正確朝代。正確會鎖定，錯誤會彈回事件區。</p>
      </div>
      <div class="counter" aria-live="polite">
        嘗試次數
        <span id="attemptCount">0</span>
      </div>
    </header>

    <section class="game" aria-label="朝代事件配對遊戲">
      <div class="dynasty-board" id="dynastyBoard" aria-label="朝代掉落區"></div>

      <aside class="event-panel" aria-label="事件卡片區">
        <div class="panel-title">
          <span>事件卡</span>
          <span class="remaining">剩餘 <span id="remainingCount">0</span> 張</span>
        </div>
        <div class="event-list" id="eventList"></div>
      </aside>
    </section>
  </main>

  <section class="complete-overlay" id="completeOverlay" aria-live="assertive">
    <div class="complete-dialog" role="dialog" aria-modal="true" aria-labelledby="completeTitle">
      <h2 id="completeTitle">恭喜過關</h2>
      <p>總嘗試次數：<span id="finalAttempts">0</span></p>
      <button id="restartButton" type="button">再玩一次</button>
    </div>
  </section>

  <script>
    const dynasties = [
      { id: 1, name: "秦" },
      { id: 2, name: "漢" },
      { id: 3, name: "唐" },
      { id: 4, name: "宋" },
      { id: 5, name: "明" },
      { id: 6, name: "清" }
    ];

    const events = [
      { id: "e1", dynasty_id: 1, text: "統一六國", icon: "⚔️" },
      { id: "e2", dynasty_id: 1, text: "修築萬里長城", icon: "🧱" },
      { id: "e3", dynasty_id: 1, text: "焚書坑儒", icon: "🔥" },
      { id: "e4", dynasty_id: 2, text: "張騫通西域", icon: "🐪" },
      { id: "e5", dynasty_id: 2, text: "文景之治", icon: "📜" },
      { id: "e6", dynasty_id: 2, text: "罷黜百家獨尊儒術", icon: "📖" },
      { id: "e7", dynasty_id: 3, text: "貞觀之治", icon: "👑" },
      { id: "e8", dynasty_id: 3, text: "安史之亂", icon: "💥" },
      { id: "e9", dynasty_id: 3, text: "玄奘西行取經", icon: "🧘" },
      { id: "e10", dynasty_id: 4, text: "王安石變法", icon: "📜" },
      { id: "e11", dynasty_id: 4, text: "岳飛抗金", icon: "🗡️" },
      { id: "e12", dynasty_id: 5, text: "鄭和下西洋", icon: "⛵" },
      { id: "e13", dynasty_id: 5, text: "永樂大典編成", icon: "📚" },
      { id: "e14", dynasty_id: 6, text: "鴉片戰爭", icon: "💣" },
      { id: "e15", dynasty_id: 6, text: "康熙盛世", icon: "🌅" },
      { id: "e16", dynasty_id: 6, text: "辛亥革命終結", icon: "🏛️" }
    ];

    const dynastyBoard = document.getElementById("dynastyBoard");
    const eventList = document.getElementById("eventList");
    const attemptCount = document.getElementById("attemptCount");
    const remainingCount = document.getElementById("remainingCount");
    const completeOverlay = document.getElementById("completeOverlay");
    const finalAttempts = document.getElementById("finalAttempts");
    const restartButton = document.getElementById("restartButton");

    let attempts = 0;
    let completed = 0;
    let draggedCard = null;

    function startGame() {
      attempts = 0;
      completed = 0;
      draggedCard = null;
      attemptCount.textContent = attempts;
      remainingCount.textContent = events.length;
      completeOverlay.classList.remove("show");
      dynastyBoard.innerHTML = "";
      eventList.innerHTML = "";

      dynasties.forEach((dynasty) => {
        const card = document.createElement("section");
        card.className = "dynasty-card";
        card.innerHTML = `
          <div class="dynasty-name">${dynasty.name}</div>
          <div class="drop-zone" data-dynasty-id="${dynasty.id}" aria-label="${dynasty.name}朝事件掉落區"></div>
        `;
        dynastyBoard.appendChild(card);
      });

      shuffle([...events]).forEach((eventItem) => {
        eventList.appendChild(createEventCard(eventItem));
      });
    }

    function createEventCard(eventItem) {
      const card = document.createElement("article");
      card.className = "event-card";
      card.id = eventItem.id;
      card.draggable = true;
      card.dataset.eventId = eventItem.id;
      card.dataset.dynastyId = eventItem.dynasty_id;
      card.innerHTML = `
        <span class="event-icon" aria-hidden="true">${eventItem.icon}</span>
        <span class="event-text">${eventItem.text}</span>
      `;
      card.addEventListener("dragstart", handleDragStart);
      card.addEventListener("dragend", handleDragEnd);
      return card;
    }

    function handleDragStart(event) {
      draggedCard = event.currentTarget;
      draggedCard.classList.add("dragging");
      event.dataTransfer.effectAllowed = "move";
      event.dataTransfer.setData("text/plain", draggedCard.dataset.eventId);
    }

    function handleDragEnd() {
      if (draggedCard) {
        draggedCard.classList.remove("dragging");
      }
      draggedCard = null;
    }

    dynastyBoard.addEventListener("dragover", (event) => {
      const zone = event.target.closest(".drop-zone");
      if (!zone) return;
      event.preventDefault();
      event.dataTransfer.dropEffect = "move";
      zone.classList.add("drag-over");
    });

    dynastyBoard.addEventListener("dragleave", (event) => {
      const zone = event.target.closest(".drop-zone");
      if (!zone || zone.contains(event.relatedTarget)) return;
      zone.classList.remove("drag-over");
    });

    dynastyBoard.addEventListener("drop", (event) => {
      const zone = event.target.closest(".drop-zone");
      if (!zone) return;
      event.preventDefault();
      zone.classList.remove("drag-over");

      const eventId = event.dataTransfer.getData("text/plain");
      const card = document.getElementById(eventId);
      if (!card || card.classList.contains("correct")) return;

      attempts += 1;
      attemptCount.textContent = attempts;

      if (card.dataset.dynastyId === zone.dataset.dynastyId) {
        lockCorrectCard(card, zone);
      } else {
        flashWrong(card);
      }
    });

    function lockCorrectCard(card, zone) {
      card.classList.remove("dragging", "wrong");
      card.classList.add("correct");
      card.draggable = false;
      zone.appendChild(card);
      completed += 1;
      remainingCount.textContent = events.length - completed;

      if (completed === events.length) {
        setTimeout(showComplete, 300);
      }
    }

    function flashWrong(card) {
      card.classList.remove("wrong");
      void card.offsetWidth;
      card.classList.add("wrong");
      setTimeout(() => card.classList.remove("wrong"), 300);
    }

    function showComplete() {
      awardCertificate("cert_dynasty");
      finalAttempts.textContent = attempts;
      completeOverlay.classList.add("show");
      restartButton.focus();
    }

    function awardCertificate(key) {
      if (!localStorage.getItem("adventure_start")) {
        localStorage.setItem("adventure_start", String(Date.now()));
      }
      localStorage.setItem(key, "true");
    }

    function shuffle(items) {
      for (let i = items.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [items[i], items[j]] = [items[j], items[i]];
      }
      return items;
    }

    document.querySelectorAll(".drop-zone").forEach((zone) => {
      zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
    });

    restartButton.addEventListener("click", startGame);
    startGame();
  </script>
</body>
</html>
